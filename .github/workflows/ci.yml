name: Python CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install UV
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Sync project
        run: |
          uv sync --all-groups

      - name: Run pre-commit
        run: |
          uv run pre-commit run --all-files

  pytest:
    runs-on: ubuntu-latest
    needs: pre-commit

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install UV
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Sync project
        run: |
          uv sync --all-groups

      - name: Run tests
        run: |
          uv run pytest tests/
