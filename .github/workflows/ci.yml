name: Python CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      target:
        description: "Cloud Run target environment"
        required: true
        default: "staging"
        type: choice
        options: ["staging", "production"]

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install UV
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Sync project
        run: |
          uv sync --all-groups

      - name: Run pre-commit
        run: |
          uv run pre-commit run --all-files

  pytest:
    runs-on: ubuntu-latest
    needs: pre-commit

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install UV
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Sync project
        run: |
          uv sync --all-groups

      - name: Run tests
        run: |
          uv run pytest tests/

  deploy:
    runs-on: ubuntu-latest
    needs: pytest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: valore-mlsd-project
      REGION: europe-west1
      MODEL_DISPLAY_NAME: valore-xgboost

    steps:
      - uses: actions/checkout@v4

      - name: Compute deployment target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.target }}" = "production" ]; then
              echo "suffix=" >> "$GITHUB_OUTPUT"
            else
              echo "suffix=-staging" >> "$GITHUB_OUTPUT"
            fi
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "suffix=" >> "$GITHUB_OUTPUT"
          else
            echo "suffix=-staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy "valore-api${{ steps.target.outputs.suffix }}" \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --source=. \
            --set-env-vars="GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=$REGION,MODEL_DISPLAY_NAME=$MODEL_DISPLAY_NAME" \
            --allow-unauthenticated \
            --max-instances=2

      - name: Resolve API URL
        id: api
        run: |
          api_url="$(gcloud run services describe "valore-api${{ steps.target.outputs.suffix }}" \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --format='value(status.url)')"
          echo "url=$api_url" >> "$GITHUB_OUTPUT"

      - name: Deploy dashboard to Cloud Run
        run: |
          gcloud run deploy "valore-dashboard${{ steps.target.outputs.suffix }}" \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --source=dashboard \
            --port=8501 \
            --set-env-vars="API_URL=${{ steps.api.outputs.url }},GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=$REGION,MODEL_DISPLAY_NAME=$MODEL_DISPLAY_NAME" \
            --allow-unauthenticated \
            --max-instances=2
